<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة السمكة</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #061022; overflow: hidden; font-family: Arial, sans-serif; }
canvas { display: block; }
#ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#color-picker {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,10,30,0.93);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 22px; z-index: 10; pointer-events: all;
}
#color-picker h2 { color: #fff; font-size: 26px; font-weight: bold; direction: rtl; }
#color-picker p { color: rgba(255,255,255,0.6); font-size: 16px; direction: rtl; }
.color-options { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; max-width: 380px; }
.color-btn {
  width: 64px; height: 64px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.15);
  cursor: pointer; transition: transform 0.15s, border-color 0.15s;
  pointer-events: all;
}
.color-btn:hover { transform: scale(1.18); border-color: rgba(255,255,255,0.85); }
#score-display {
  position: absolute; top: 14px; left: 14px; color: #fff; font-size: 16px; font-weight: bold;
  background: rgba(0,0,0,0.45); padding: 7px 16px; border-radius: 20px;
}
#level-display {
  position: absolute; top: 14px; right: 14px; color: #7dd3fc; font-size: 15px;
  background: rgba(0,0,0,0.45); padding: 7px 16px; border-radius: 20px;
}
#game-over {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.78);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; z-index: 20; pointer-events: all;
}
#game-over h2 { color: #f87171; font-size: 32px; font-weight: bold; }
#game-over p { color: rgba(255,255,255,0.75); font-size: 18px; direction: rtl; }
#restart-btn {
  background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.35);
  color: #fff; padding: 12px 36px; border-radius: 28px;
  font-size: 18px; cursor: pointer; pointer-events: all; transition: background 0.15s;
}
#restart-btn:hover { background: rgba(255,255,255,0.22); }
#instructions {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.35); font-size: 13px; white-space: nowrap;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="color-picker">
    <h2>🐟 اختر لون سمكتك</h2>
    <p>كُل السمك الأصغر، وتجنّب الأكبر والقمامة!</p>
    <div class="color-options">
      <div class="color-btn" style="background:#ef4444" data-color="#ef4444"></div>
      <div class="color-btn" style="background:#f97316" data-color="#f97316"></div>
      <div class="color-btn" style="background:#eab308" data-color="#eab308"></div>
      <div class="color-btn" style="background:#22c55e" data-color="#22c55e"></div>
      <div class="color-btn" style="background:#06b6d4" data-color="#06b6d4"></div>
      <div class="color-btn" style="background:#8b5cf6" data-color="#8b5cf6"></div>
      <div class="color-btn" style="background:#ec4899" data-color="#ec4899"></div>
      <div class="color-btn" style="background:#f8fafc" data-color="#f8fafc"></div>
    </div>
  </div>
  <div id="score-display">النقاط: <span id="score">0</span></div>
  <div id="level-display">المستوى: <span id="level">1</span></div>
  <div id="game-over">
    <h2>💀 انتهت اللعبة!</h2>
    <p id="final-score">حصلت على 0 نقطة</p>
    <button id="restart-btn" onclick="restartGame()">🔄 العب مجدداً</button>
  </div>
  <div id="instructions">تحكم بالسمكة بالماوس أو إصبعك على الشاشة</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let W, H;
let playerColor = '#06b6d4';
let gameRunning = false;
let score = 0, level = 1;
let player, fish = [], trash = [], bubbles = [], particles = [];
let mx, my;
let animId, frameCount = 0;

const trashColors = ['#78716c','#a8a29e','#57534e','#6b7280'];

function lerp(a, b, t) { return a + (b - a) * t; }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function initPlayer(color) {
  W = canvas.width; H = canvas.height;
  mx = W / 2; my = H / 2;
  return { x: W/2, y: H/2, r: 22, color, vx: 0, vy: 0, facing: 1 };
}

function spawnFish() {
  W = canvas.width; H = canvas.height;
  const side = Math.random() < 0.5 ? -1 : 1;
  const r = 8 + Math.random() * 28;
  const speed = (0.6 + Math.random() * 1.4) * (r < 16 ? 1.3 : 0.8);
  const hues = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#8b5cf6','#ec4899','#f8fafc','#14b8a6','#e879f9','#fb923c','#a3e635'];
  return {
    x: side === 1 ? -r-10 : W+r+10,
    y: 70 + Math.random() * (H - 140),
    r, vx: side * speed, vy: (Math.random() - 0.5) * 0.5,
    color: hues[Math.floor(Math.random() * hues.length)],
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.03 + Math.random() * 0.04
  };
}

function spawnTrash() {
  W = canvas.width; H = canvas.height;
  const side = Math.random() < 0.5 ? -1 : 1;
  const r = 10 + Math.random() * 14;
  return {
    x: side === 1 ? -r-10 : W+r+10,
    y: 90 + Math.random() * (H - 180),
    r, vx: side * (0.4 + Math.random() * 0.8),
    vy: (Math.random() - 0.5) * 0.3,
    color: trashColors[Math.floor(Math.random() * trashColors.length)],
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    type: Math.floor(Math.random() * 3)
  };
}

function spawnBubbles(n) {
  W = canvas.width; H = canvas.height;
  for (let i = 0; i < n; i++) {
    bubbles.push({
      x: Math.random() * W, y: H + 20,
      r: 2 + Math.random() * 5,
      speed: 0.3 + Math.random() * 0.7,
      wobble: Math.random() * Math.PI * 2
    });
  }
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, r: 3+Math.random()*4, color, life: 1 });
  }
}

function startGame() {
  W = canvas.width; H = canvas.height;
  document.getElementById('color-picker').style.display = 'none';
  document.getElementById('game-over').style.display = 'none';
  cancelAnimationFrame(animId);
  player = initPlayer(playerColor);
  fish = []; trash = []; bubbles = []; particles = [];
  score = 0; level = 1; frameCount = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('level').textContent = '1';
  spawnBubbles(25);
  for (let i = 0; i < 7; i++) fish.push(spawnFish());
  for (let i = 0; i < 2; i++) trash.push(spawnTrash());
  gameRunning = true;
  loop();
}

function restartGame() {
  cancelAnimationFrame(animId);
  gameRunning = false;
  startGame();
}

function loop() {
  if (!gameRunning) return;
  animId = requestAnimationFrame(loop);
  frameCount++;
  W = canvas.width; H = canvas.height;

  // Background
  ctx.fillStyle = '#061022';
  ctx.fillRect(0, 0, W, H);

  // Water gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(6,50,100,0.18)');
  grad.addColorStop(0.5, 'rgba(2,20,60,0.28)');
  grad.addColorStop(1, 'rgba(0,5,30,0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Light rays
  ctx.save();
  ctx.globalAlpha = 0.04;
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = '#7dd3fc';
    ctx.beginPath();
    const rx = W * 0.15 + W * 0.18 * i;
    ctx.moveTo(rx - 20, 0);
    ctx.lineTo(rx + 20, 0);
    ctx.lineTo(rx + 60 + i*10, H * 0.6);
    ctx.lineTo(rx - 60 - i*10, H * 0.6);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // Bubbles
  bubbles.forEach(b => {
    b.y -= b.speed; b.wobble += 0.025; b.x += Math.sin(b.wobble) * 0.5;
    if (b.y < -10) { b.y = H + 10; b.x = Math.random() * W; }
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(120,200,255,0.22)'; ctx.lineWidth = 0.8; ctx.stroke();
  });

  // Spawn
  const spawnRate = Math.max(35, 75 - level * 4);
  if (frameCount % spawnRate === 0) fish.push(spawnFish());
  if (frameCount % 160 === 0) trash.push(spawnTrash());
  if (frameCount % 80 === 0 && bubbles.length < 35) spawnBubbles(3);

  // Player movement
  player.vx = lerp(player.vx, (mx - player.x) * 0.07, 0.2);
  player.vy = lerp(player.vy, (my - player.y) * 0.07, 0.2);
  player.x += player.vx; player.y += player.vy;
  player.x = Math.max(player.r, Math.min(W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y));
  if (player.vx > 0.5) player.facing = 1;
  if (player.vx < -0.5) player.facing = -1;

  // Fish
  for (let i = fish.length - 1; i >= 0; i--) {
    const f = fish[i];
    f.wobble += f.wobbleSpeed;
    f.y += Math.sin(f.wobble) * 0.5;
    f.x += f.vx;
    if (f.x < -120 || f.x > W + 120) { fish.splice(i, 1); continue; }
    drawFish(ctx, f.x, f.y, f.r, f.color, f.vx > 0 ? 1 : -1, false);
    if (dist(player, f) < player.r + f.r * 0.75) {
      if (f.r < player.r * 0.85) {
        spawnParticles(f.x, f.y, f.color);
        score += Math.round(f.r);
        player.r = Math.min(65, player.r + f.r * 0.08);
        document.getElementById('score').textContent = score;
        level = Math.floor(score / 60) + 1;
        document.getElementById('level').textContent = level;
        fish.splice(i, 1);
      } else if (f.r > player.r * 1.15) {
        endGame(); return;
      }
    }
  }

  // Trash
  for (let i = trash.length - 1; i >= 0; i--) {
    const t = trash[i];
    t.x += t.vx; t.y += t.vy; t.rot += t.rotSpeed;
    if (t.x < -120 || t.x > W + 120) { trash.splice(i, 1); continue; }
    drawTrash(ctx, t.x, t.y, t.r, t.color, t.rot, t.type);
    if (dist(player, t) < player.r + t.r * 0.7) {
      endGame(); return;
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= 0.045; p.r *= 0.94;
    ctx.globalAlpha = p.life;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.fill();
    ctx.globalAlpha = 1;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Player fish
  drawFish(ctx, player.x, player.y, player.r, player.color, player.facing, true);

  // Glow ring
  ctx.globalAlpha = 0.12;
  ctx.beginPath(); ctx.arc(player.x, player.y, player.r + 6, 0, Math.PI * 2);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawFish(ctx, x, y, r, color, dir, isPlayer) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir, 1);

  // Tail
  ctx.beginPath();
  ctx.moveTo(-r * 0.5, 0);
  ctx.lineTo(-r * 1.45, -r * 0.72);
  ctx.lineTo(-r * 1.45, r * 0.72);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.78;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 0, r, r * 0.62, 0, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  // Shimmer
  ctx.beginPath();
  ctx.ellipse(-r*0.1, -r*0.16, r*0.38, r*0.2, Math.PI*0.15, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fill();

  // Top fin
  ctx.beginPath();
  ctx.moveTo(0, -r * 0.6);
  ctx.quadraticCurveTo(r * 0.3, -r * 1.1, r * 0.5, -r * 0.5);
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.68;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Eye
  ctx.beginPath();
  ctx.arc(r * 0.44, -r * 0.1, r * 0.19, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.beginPath();
  ctx.arc(r * 0.5, -r * 0.1, r * 0.09, 0, Math.PI * 2);
  ctx.fillStyle = '#111'; ctx.fill();

  if (isPlayer) {
    ctx.beginPath();
    ctx.ellipse(0, 0, r + 4, r * 0.66 + 4, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.5; ctx.stroke();
  }
  ctx.restore();
}

function drawTrash(ctx, x, y, r, color, rot, type) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.fillStyle = color;
  if (type === 0) {
    ctx.beginPath();
    ctx.roundRect(-r*0.4, -r, r*0.8, r*2, r*0.3);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.ellipse(0, -r*0.3, r*0.2, r*0.5, 0, 0, Math.PI*2); ctx.fill();
  } else if (type === 1) {
    ctx.beginPath();
    ctx.ellipse(0, 0, r*0.65, r, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath(); ctx.moveTo(-r*0.65, i*r*0.3); ctx.lineTo(r*0.65, i*r*0.3); ctx.stroke();
    }
  } else {
    ctx.beginPath();
    ctx.moveTo(0, -r*0.9);
    ctx.bezierCurveTo(r*1.1, -r*0.5, r*1.1, r*0.8, 0, r);
    ctx.bezierCurveTo(-r*1.1, r*0.8, -r*1.1, -r*0.5, 0, -r*0.9);
    ctx.fill();
  }
  ctx.fillStyle = 'rgba(255,200,50,0.85)';
  ctx.font = `bold ${Math.round(r * 0.72)}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('!', 0, 0);
  ctx.restore();
}

function endGame() {
  gameRunning = false;
  document.getElementById('final-score').textContent = `حصلت على ${score} نقطة`;
  document.getElementById('game-over').style.display = 'flex';
}

// Controls
canvas.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
}, { passive: false });

// Color picker buttons
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    playerColor = btn.dataset.color;
    startGame();
  });
});
</script>
</body>
</html>
